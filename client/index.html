<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sky Climb Race</title>
<link rel="stylesheet" href="css/style.css" />
</head>
<body>

<h1>⛰ SKY CLIMB RACE ⛰</h1>

<!-- ===== MODE SELECT ===== -->
<div id="mode-select">
  <button id="localModeBtn">🎮 LOCAL<span>same keyboard</span></button>
  <button id="onlineModeBtn">🌐 ONLINE<span>over the internet</span></button>
</div>

<!-- ===== ONLINE LOBBY ===== -->
<div id="lobby" class="hidden">
  <input type="text" id="roomInput" placeholder="Room Code" value="race1" />
  <button id="connectBtn">🔗 CONNECT</button>
  <span id="status">● Not connected</span>
  <span id="roomStatus" class="hidden"></span>
</div>

<div id="stage" class="hidden" tabindex="0">

  <!-- CSS waterfall background — one shared layer behind the transparent canvas -->
  <div id="scene-bg" aria-hidden="true">
    <div class="waterfall wf-1"></div>
    <div class="waterfall wf-2"></div>
    <div class="waterfall wf-3"></div>
    <div class="waterfall wf-4"></div>
  </div>

  <canvas id="game"></canvas>

  <div id="hud">
    <div class="hud-player p1">
      <span class="player-label">PLAYER 1</span>
      <span class="height-score" id="score1">0m</span>
    </div>
    <div id="timer-display">⏱ 60s</div>
    <div class="hud-player p2">
      <span class="height-score" id="score2">0m</span>
      <span class="player-label">PLAYER 2</span>
    </div>
  </div>

  <div id="start-overlay">
    <div id="start-text">CLICK TO START<span>both players ready up on the same keyboard</span></div>
  </div>
</div>

<div id="controls-row" class="hidden">
  <button id="menuBtn">⌂ MENU</button>
  <span class="key-hint local-only-hint">P1: <kbd>W</kbd><kbd>A</kbd><kbd>D</kbd></span>
  <span class="key-hint online-only-hint hidden">Move: <kbd>A</kbd><kbd>D</kbd> or <kbd>←</kbd><kbd>→</kbd> · Jump: <kbd>W</kbd> or <kbd>↑</kbd></span>

  <div id="timer-section">
    <div id="timer-buttons">
      <button class="timer-btn" data-duration="30">30s</button>
      <button class="timer-btn active" data-duration="60">60s</button>
      <button class="timer-btn" data-duration="0">∞</button>
    </div>
    <button id="restartBtn">⟲ RESTART</button>
  </div>

  <span class="key-hint local-only-hint">P2: <kbd>↑</kbd><kbd>←</kbd><kbd>→</kbd></span>
</div>

<script src="/socket.io/socket.io.js"></script>
<script src="js/constants.js"></script>
<script src="js/world.js"></script>
<script src="js/player.js"></script>
<script src="js/render.js"></script>
<script src="js/main.js"></script>
</body>
</html>
