<svg viewBox="0 0 900 560" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#2f6fed"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="900" height="560" fill="#f7f8fa"/>
  <text x="450" y="34" text-anchor="middle" font-size="20" font-weight="bold" fill="#1a2744">Sky Climb — High-Level Architecture</text>

  <!-- CLIENT -->
  <rect x="40" y="70" width="380" height="450" rx="10" fill="#ffffff" stroke="#1a2744" stroke-width="2"/>
  <text x="230" y="98" text-anchor="middle" font-size="16" font-weight="bold" fill="#1a2744">Player's Browser (Client)</text>

  <rect x="70" y="120" width="320" height="60" rx="6" fill="#e8f0fe" stroke="#2f6fed" stroke-width="1.5"/>
  <text x="230" y="145" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a2744">UI / Mode Select</text>
  <text x="230" y="163" text-anchor="middle" font-size="11" fill="#444">Local vs Online, lobby, HUD</text>

  <rect x="70" y="200" width="320" height="60" rx="6" fill="#e8f0fe" stroke="#2f6fed" stroke-width="1.5"/>
  <text x="230" y="225" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a2744">Input Handler</text>
  <text x="230" y="243" text-anchor="middle" font-size="11" fill="#444">Keyboard events → left/right/jump</text>

  <rect x="70" y="280" width="320" height="60" rx="6" fill="#e8f0fe" stroke="#2f6fed" stroke-width="1.5"/>
  <text x="230" y="305" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a2744">Renderer (Canvas)</text>
  <text x="230" y="323" text-anchor="middle" font-size="11" fill="#444">Draws whatever state it's given</text>

  <rect x="70" y="360" width="320" height="130" rx="6" fill="#f0f0f5" stroke="#8892b0" stroke-width="1.5"/>
  <text x="230" y="384" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a2744">Shared Game Modules</text>
  <text x="230" y="406" text-anchor="middle" font-size="11" fill="#444">constants.js · world.js</text>
  <text x="230" y="424" text-anchor="middle" font-size="11" fill="#444">player.js · render.js</text>
  <text x="230" y="446" text-anchor="middle" font-size="10" fill="#777" font-style="italic">used by both Local and Online modes</text>
  <text x="230" y="466" text-anchor="middle" font-size="10" fill="#777" font-style="italic">to draw an identical visual result</text>

  <!-- SERVER -->
  <rect x="480" y="70" width="380" height="450" rx="10" fill="#ffffff" stroke="#1a2744" stroke-width="2"/>
  <text x="670" y="98" text-anchor="middle" font-size="16" font-weight="bold" fill="#1a2744">Node.js Server</text>

  <rect x="510" y="120" width="320" height="60" rx="6" fill="#fdece8" stroke="#e05a3a" stroke-width="1.5"/>
  <text x="670" y="145" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a2744">Express Static Server</text>
  <text x="670" y="163" text-anchor="middle" font-size="11" fill="#444">Serves client/ (html, css, js)</text>

  <rect x="510" y="200" width="320" height="60" rx="6" fill="#fdece8" stroke="#e05a3a" stroke-width="1.5"/>
  <text x="670" y="225" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a2744">Socket.IO Connection Handler</text>
  <text x="670" y="243" text-anchor="middle" font-size="11" fill="#444">join / input / disconnect events</text>

  <rect x="510" y="280" width="320" height="60" rx="6" fill="#fdece8" stroke="#e05a3a" stroke-width="1.5"/>
  <text x="670" y="305" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a2744">Room Manager</text>
  <text x="670" y="323" text-anchor="middle" font-size="11" fill="#444">Player slots, room lifecycle, cleanup</text>

  <rect x="510" y="360" width="320" height="130" rx="6" fill="#fdece8" stroke="#e05a3a" stroke-width="1.5"/>
  <text x="670" y="384" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a2744">Game Loop (60Hz)</text>
  <text x="670" y="406" text-anchor="middle" font-size="11" fill="#444">Physics · Collision · Timer</text>
  <text x="670" y="424" text-anchor="middle" font-size="11" fill="#444">Win condition · Score</text>
  <text x="670" y="446" text-anchor="middle" font-size="10" fill="#c0392b" font-weight="bold">Authoritative — client never</text>
  <text x="670" y="462" text-anchor="middle" font-size="10" fill="#c0392b" font-weight="bold">computes any of this itself</text>

  <!-- CONNECTIONS -->
  <line x1="420" y1="150" x2="480" y2="150" stroke="#2f6fed" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="450" y="140" text-anchor="middle" font-size="10" fill="#2f6fed" font-weight="bold">HTTPS</text>
  <text x="450" y="170" text-anchor="middle" font-size="9" fill="#666">(initial page load)</text>

  <line x1="480" y1="230" x2="420" y2="230" stroke="#2f6fed" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="420" y1="215" x2="480" y2="215" stroke="#2f6fed" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="450" y="255" text-anchor="middle" font-size="10" fill="#2f6fed" font-weight="bold">WebSocket</text>
  <text x="450" y="267" text-anchor="middle" font-size="9" fill="#666">(Socket.IO, bidirectional)</text>

  <text x="450" y="530" text-anchor="middle" font-size="11" fill="#666" font-style="italic">Client sends only input; server sends back the full authoritative game state.</text>
</svg>
