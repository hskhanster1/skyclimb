services:
  - type: web
    name: skyclimb
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: ALLOWED_ORIGIN
        # Set this to your deployed URL once Render assigns it,
        # e.g. https://skyclimb.onrender.com
        value: "*"
    healthCheckPath: /
