<svg viewBox="0 0 900 600" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow4" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L8,3 z" fill="#666"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="900" height="600" fill="#f7f8fa"/>
  <text x="450" y="34" text-anchor="middle" font-size="20" font-weight="bold" fill="#1a2744">Sky Climb — Component Diagram</text>

  <!-- CLIENT COMPONENTS -->
  <text x="220" y="65" text-anchor="middle" font-size="14" font-weight="bold" fill="#1a2744">Client (client/)</text>

  <rect x="70" y="80" width="300" height="55" rx="6" fill="#e8f0fe" stroke="#2f6fed" stroke-width="1.5"/>
  <text x="220" y="103" text-anchor="middle" font-size="12" font-weight="bold" fill="#1a2744">main.js</text>
  <text x="220" y="120" text-anchor="middle" font-size="10" fill="#444">orchestrator — mode select, input, loop</text>

  <rect x="70" y="170" width="135" height="50" rx="6" fill="#f0f0f5" stroke="#8892b0" stroke-width="1.5"/>
  <text x="137" y="192" text-anchor="middle" font-size="11" font-weight="bold" fill="#1a2744">render.js</text>
  <text x="137" y="207" text-anchor="middle" font-size="9" fill="#444">draws columns</text>

  <rect x="235" y="170" width="135" height="50" rx="6" fill="#f0f0f5" stroke="#8892b0" stroke-width="1.5"/>
  <text x="302" y="192" text-anchor="middle" font-size="11" font-weight="bold" fill="#1a2744">world.js</text>
  <text x="302" y="207" text-anchor="middle" font-size="9" fill="#444">platform pattern (local mode)</text>

  <rect x="70" y="240" width="135" height="50" rx="6" fill="#f0f0f5" stroke="#8892b0" stroke-width="1.5"/>
  <text x="137" y="262" text-anchor="middle" font-size="11" font-weight="bold" fill="#1a2744">player.js</text>
  <text x="137" y="277" text-anchor="middle" font-size="9" fill="#444">physics (local mode)</text>

  <rect x="235" y="240" width="135" height="50" rx="6" fill="#f0f0f5" stroke="#8892b0" stroke-width="1.5"/>
  <text x="302" y="262" text-anchor="middle" font-size="11" font-weight="bold" fill="#1a2744">constants.js</text>
  <text x="302" y="277" text-anchor="middle" font-size="9" fill="#444">shared tuning values</text>

  <line x1="220" y1="135" x2="137" y2="170" stroke="#666" stroke-width="1.5" marker-end="url(#arrow4)"/>
  <line x1="220" y1="135" x2="302" y2="170" stroke="#666" stroke-width="1.5" marker-end="url(#arrow4)"/>
  <line x1="137" y1="220" x2="137" y2="240" stroke="#666" stroke-width="1.5" marker-end="url(#arrow4)"/>
  <line x1="302" y1="220" x2="302" y2="240" stroke="#666" stroke-width="1.5" marker-end="url(#arrow4)"/>

  <rect x="70" y="310" width="300" height="45" rx="6" fill="#fff7d9" stroke="#d4a017" stroke-width="1.5"/>
  <text x="220" y="337" text-anchor="middle" font-size="11" fill="#1a2744">index.html + style.css (UI shell, HUD)</text>

  <!-- SOCKET.IO CLIENT -->
  <rect x="70" y="380" width="300" height="45" rx="6" fill="#ffffff" stroke="#2f6fed" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="220" y="407" text-anchor="middle" font-size="11" fill="#1a2744">socket.io client (loaded from server, online mode only)</text>

  <!-- SERVER COMPONENTS -->
  <text x="680" y="65" text-anchor="middle" font-size="14" font-weight="bold" fill="#1a2744">Server (server/server.js)</text>
  <text x="680" y="82" text-anchor="middle" font-size="10" font-style="italic" fill="#777">currently one file — logical components shown below</text>

  <rect x="530" y="95" width="300" height="50" rx="6" fill="#fdece8" stroke="#e05a3a" stroke-width="1.5"/>
  <text x="680" y="118" text-anchor="middle" font-size="12" font-weight="bold" fill="#1a2744">Express Static Handler</text>
  <text x="680" y="135" text-anchor="middle" font-size="9" fill="#444">serves client/ on the same origin</text>

  <rect x="530" y="160" width="300" height="50" rx="6" fill="#fdece8" stroke="#e05a3a" stroke-width="1.5"/>
  <text x="680" y="183" text-anchor="middle" font-size="12" font-weight="bold" fill="#1a2744">Socket.IO Handler</text>
  <text x="680" y="200" text-anchor="middle" font-size="9" fill="#444">join / input / disconnect events</text>

  <rect x="530" y="225" width="300" height="50" rx="6" fill="#fdece8" stroke="#e05a3a" stroke-width="1.5"/>
  <text x="680" y="248" text-anchor="middle" font-size="12" font-weight="bold" fill="#1a2744">Room Manager</text>
  <text x="680" y="265" text-anchor="middle" font-size="9" fill="#444">rooms{} — slots, cleanup, roomStatus</text>

  <rect x="530" y="290" width="300" height="50" rx="6" fill="#fdece8" stroke="#e05a3a" stroke-width="1.5"/>
  <text x="680" y="313" text-anchor="middle" font-size="12" font-weight="bold" fill="#1a2744">Physics Engine</text>
  <text x="680" y="330" text-anchor="middle" font-size="9" fill="#444">updatePlayer() — gravity, collision</text>

  <rect x="530" y="355" width="300" height="50" rx="6" fill="#fdece8" stroke="#e05a3a" stroke-width="1.5"/>
  <text x="680" y="378" text-anchor="middle" font-size="12" font-weight="bold" fill="#1a2744">Game Loop (60Hz)</text>
  <text x="680" y="395" text-anchor="middle" font-size="9" fill="#444">timer, win logic, state broadcast</text>

  <rect x="530" y="420" width="300" height="55" rx="6" fill="#ffffff" stroke="#8892b0" stroke-width="1.5"/>
  <text x="680" y="443" text-anchor="middle" font-size="11" fill="#1a2744">Platform Generator</text>
  <text x="680" y="460" text-anchor="middle" font-size="9" fill="#444">seedPattern() / ensurePatternAbove()</text>

  <line x1="680" y1="145" x2="680" y2="160" stroke="#666" stroke-width="1.5" marker-end="url(#arrow4)"/>
  <line x1="680" y1="210" x2="680" y2="225" stroke="#666" stroke-width="1.5" marker-end="url(#arrow4)"/>
  <line x1="680" y1="275" x2="680" y2="290" stroke="#666" stroke-width="1.5" marker-end="url(#arrow4)"/>
  <line x1="680" y1="340" x2="680" y2="355" stroke="#666" stroke-width="1.5" marker-end="url(#arrow4)"/>
  <line x1="680" y1="405" x2="680" y2="420" stroke="#666" stroke-width="1.5" marker-end="url(#arrow4)"/>

  <rect x="150" y="520" width="600" height="60" rx="8" fill="#f0f0f5" stroke="#8892b0" stroke-width="1.5"/>
  <text x="450" y="545" text-anchor="middle" font-size="11" fill="#333" font-weight="bold">Refactor opportunity for Phase 8:</text>
  <text x="450" y="563" text-anchor="middle" font-size="10" fill="#333">split server.js into separate modules (roomManager.js, physics.js, socketHandlers.js)</text>
  <text x="450" y="576" text-anchor="middle" font-size="10" fill="#333">as secure-coding controls are added, to keep each concern independently testable</text>
</svg>
