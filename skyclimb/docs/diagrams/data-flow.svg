<svg viewBox="0 0 900 620" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow2" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#2f6fed"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="900" height="620" fill="#f7f8fa"/>
  <text x="450" y="34" text-anchor="middle" font-size="20" font-weight="bold" fill="#1a2744">Sky Climb — Data Flow (Online Mode)</text>

  <!-- Row 1: Keyboard -->
  <rect x="60" y="70" width="200" height="55" rx="8" fill="#fff7d9" stroke="#d4a017" stroke-width="1.5"/>
  <text x="160" y="102" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a2744">Keyboard Input</text>

  <line x1="160" y1="125" x2="160" y2="165" stroke="#2f6fed" stroke-width="2" marker-end="url(#arrow2)"/>

  <!-- Row 2: Client input handler -->
  <rect x="60" y="170" width="200" height="55" rx="8" fill="#e8f0fe" stroke="#2f6fed" stroke-width="1.5"/>
  <text x="160" y="195" text-anchor="middle" font-size="12" font-weight="bold" fill="#1a2744">Client Input Handler</text>
  <text x="160" y="212" text-anchor="middle" font-size="10" fill="#444">builds {left, right, jump}</text>

  <line x1="260" y1="197" x2="380" y2="197" stroke="#2f6fed" stroke-width="2" marker-end="url(#arrow2)"/>
  <text x="320" y="185" text-anchor="middle" font-size="10" font-weight="bold" fill="#c0392b">emit('input')</text>

  <!-- Row 2: server input -->
  <rect x="385" y="170" width="200" height="55" rx="8" fill="#fdece8" stroke="#e05a3a" stroke-width="1.5"/>
  <text x="485" y="195" text-anchor="middle" font-size="12" font-weight="bold" fill="#1a2744">Room.keys[player]</text>
  <text x="485" y="212" text-anchor="middle" font-size="10" fill="#444">stored, not yet applied</text>

  <line x1="485" y1="225" x2="485" y2="265" stroke="#2f6fed" stroke-width="2" marker-end="url(#arrow2)"/>

  <!-- Row 3: physics -->
  <rect x="385" y="270" width="200" height="65" rx="8" fill="#fdece8" stroke="#e05a3a" stroke-width="1.5"/>
  <text x="485" y="295" text-anchor="middle" font-size="12" font-weight="bold" fill="#1a2744">Physics Tick (60Hz)</text>
  <text x="485" y="312" text-anchor="middle" font-size="10" fill="#444">updatePlayer(): gravity,</text>
  <text x="485" y="326" text-anchor="middle" font-size="10" fill="#444">collisions, movement</text>

  <line x1="485" y1="335" x2="485" y2="375" stroke="#2f6fed" stroke-width="2" marker-end="url(#arrow2)"/>

  <!-- Row 4: room state -->
  <rect x="385" y="380" width="200" height="65" rx="8" fill="#fdece8" stroke="#e05a3a" stroke-width="1.5"/>
  <text x="485" y="405" text-anchor="middle" font-size="12" font-weight="bold" fill="#1a2744">Room State</text>
  <text x="485" y="422" text-anchor="middle" font-size="10" fill="#444">x, y, facing, height,</text>
  <text x="485" y="436" text-anchor="middle" font-size="10" fill="#444">pattern, timer, winner</text>

  <line x1="585" y1="412" x2="700" y2="412" stroke="#2f6fed" stroke-width="2" marker-end="url(#arrow2)"/>
  <text x="642" y="400" text-anchor="middle" font-size="10" font-weight="bold" fill="#c0392b">emit('state')</text>
  <text x="642" y="428" text-anchor="middle" font-size="9" fill="#666">broadcast to room, 60Hz</text>

  <!-- Row 4: client renderer -->
  <rect x="700" y="380" width="180" height="65" rx="8" fill="#e8f0fe" stroke="#2f6fed" stroke-width="1.5"/>
  <text x="790" y="405" text-anchor="middle" font-size="12" font-weight="bold" fill="#1a2744">Client Renderer</text>
  <text x="790" y="422" text-anchor="middle" font-size="10" fill="#444">rescales x, draws to</text>
  <text x="790" y="436" text-anchor="middle" font-size="10" fill="#444">&lt;canvas&gt;</text>

  <line x1="790" y1="380" x2="790" y2="345" stroke="#2f6fed" stroke-width="2" marker-end="url(#arrow2)"/>

  <!-- side note box -->
  <rect x="700" y="230" width="180" height="100" rx="8" fill="#fff7d9" stroke="#d4a017" stroke-width="1.5"/>
  <text x="790" y="255" text-anchor="middle" font-size="12" font-weight="bold" fill="#1a2744">Screen</text>
  <text x="790" y="275" text-anchor="middle" font-size="10" fill="#444">Player sees both</text>
  <text x="790" y="290" text-anchor="middle" font-size="10" fill="#444">columns update in</text>
  <text x="790" y="305" text-anchor="middle" font-size="10" fill="#444">real time</text>

  <!-- Join flow (bottom) -->
  <rect x="40" y="500" width="820" height="90" rx="8" fill="#f0f0f5" stroke="#8892b0" stroke-width="1.5"/>
  <text x="450" y="525" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a2744">Connection / Join Flow (once per match)</text>
  <text x="450" y="550" text-anchor="middle" font-size="11" fill="#333">Client emits 'join' {roomId} → Room Manager assigns a free slot → emits 'assigned' {player} back to that client</text>
  <text x="450" y="570" text-anchor="middle" font-size="11" fill="#333">→ once both slots are filled, Room Manager emits 'gameStart' to both clients → the 60Hz loop above begins</text>
</svg>
