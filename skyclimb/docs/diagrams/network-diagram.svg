<svg viewBox="0 0 900 480" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow5" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#2f6fed"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="900" height="480" fill="#f7f8fa"/>
  <text x="450" y="34" text-anchor="middle" font-size="20" font-weight="bold" fill="#1a2744">Sky Climb — Network / Deployment View</text>

  <!-- Player A -->
  <rect x="40" y="80" width="200" height="90" rx="8" fill="#e8f0fe" stroke="#2f6fed" stroke-width="1.5"/>
  <text x="140" y="115" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a2744">Player A's Browser</text>
  <text x="140" y="135" text-anchor="middle" font-size="10" fill="#444">Anywhere on the internet</text>
  <text x="140" y="152" text-anchor="middle" font-size="10" fill="#444">HTTPS + WebSocket (wss://)</text>

  <!-- Player B -->
  <rect x="40" y="310" width="200" height="90" rx="8" fill="#e8f0fe" stroke="#2f6fed" stroke-width="1.5"/>
  <text x="140" y="345" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a2744">Player B's Browser</text>
  <text x="140" y="365" text-anchor="middle" font-size="10" fill="#444">Anywhere on the internet</text>
  <text x="140" y="382" text-anchor="middle" font-size="10" fill="#444">HTTPS + WebSocket (wss://)</text>

  <!-- Internet cloud -->
  <ellipse cx="420" cy="240" rx="140" ry="90" fill="#ffffff" stroke="#8892b0" stroke-width="1.5" stroke-dasharray="5,4"/>
  <text x="420" y="235" text-anchor="middle" font-size="13" font-weight="bold" fill="#555">Public Internet</text>
  <text x="420" y="253" text-anchor="middle" font-size="10" fill="#777">(untrusted network)</text>

  <!-- Hosting -->
  <rect x="650" y="130" width="210" height="220" rx="8" fill="#fdece8" stroke="#e05a3a" stroke-width="2"/>
  <text x="755" y="158" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a2744">Hosting Provider</text>
  <text x="755" y="174" text-anchor="middle" font-size="9" fill="#777" font-style="italic">Render / Railway / Fly.io (Phase 11)</text>

  <rect x="670" y="190" width="170" height="55" rx="6" fill="#ffffff" stroke="#e05a3a" stroke-width="1.2"/>
  <text x="755" y="213" text-anchor="middle" font-size="11" font-weight="bold" fill="#1a2744">Single Node.js Process</text>
  <text x="755" y="230" text-anchor="middle" font-size="9" fill="#444">Express + Socket.IO, one port</text>

  <rect x="670" y="260" width="170" height="55" rx="6" fill="#ffffff" stroke="#e05a3a" stroke-width="1.2"/>
  <text x="755" y="283" text-anchor="middle" font-size="11" font-weight="bold" fill="#1a2744">In-memory Room State</text>
  <text x="755" y="300" text-anchor="middle" font-size="9" fill="#444">no external DB — rooms{} object</text>

  <!-- arrows -->
  <line x1="240" y1="130" x2="360" y2="200" stroke="#2f6fed" stroke-width="2" marker-end="url(#arrow5)"/>
  <line x1="360" y1="220" x2="240" y2="150" stroke="#2f6fed" stroke-width="2" marker-end="url(#arrow5)"/>

  <line x1="240" y1="350" x2="360" y2="280" stroke="#2f6fed" stroke-width="2" marker-end="url(#arrow5)"/>
  <line x1="360" y1="260" x2="240" y2="330" stroke="#2f6fed" stroke-width="2" marker-end="url(#arrow5)"/>

  <line x1="560" y1="220" x2="650" y2="210" stroke="#2f6fed" stroke-width="2" marker-end="url(#arrow5)"/>
  <line x1="560" y1="260" x2="650" y2="230" stroke="#2f6fed" stroke-width="2" marker-end="url(#arrow5)"/>

  <text x="450" y="430" text-anchor="middle" font-size="11" fill="#666" font-style="italic">One deployed origin serves both static assets and the WebSocket —</text>
  <text x="450" y="448" text-anchor="middle" font-size="11" fill="#666" font-style="italic">no separate frontend host or CORS split to reason about (decision made in Phase 2).</text>
</svg>
